listen = "0.0.0.0:5258"
# See `switch-keys.md` in the repository root for the list of all possible keys.
# Switch bindings are ordered: the last key in each binding is the activation
# trigger. For example, ["left-ctrl", "space"] switches only when space is
# pressed while left-ctrl is already held.
# `switch-keys` is kept for compatibility and defines one ordered chord.
# switch-keys = ["left-alt", "left-ctrl"]
switch-bindings = [
    ["left-meta", "grave"],
    ["left-ctrl", "space"],
]
# Whether switch key presses should be propagated to the previously active
# machine before its key state is released. Held modifiers other than the
# trigger are then reasserted on the newly active machine. Optional, defaults
# to true.
# propagate-switch-keys = true

# Per-client server queue size. If a client stops draining this queue, it is
# disconnected rather than letting it block server input processing.
# Optional, defaults to 256.
# client-queue-size = 256

# Optional input policy. If neither policy is configured, rkvm keeps the
# historical behavior and grabs every applicable /dev/input/event* device.
# `device-whitelist` and `device-groups` are mutually exclusive.
#
# A whitelist ORs its entries; fields within one entry are ANDed. Prefer stable
# by-id/by-path aliases over eventN paths. Vendor/product-only rules can match
# multiple event nodes from one physical device or receiver.
# device-whitelist = [
#     { path = "/dev/input/by-id/usb-Example_keyboard-event-kbd" },
#     { name = "Example Keyboard", vendor = 0x1234, product = 0xabcd },
# ]
#
# Ordered groups model one logical peripheral with multiple possible sources.
# At most one candidate per group is active. A present preferred candidate that
# is deferred, busy, or permission-blocked suppresses lower candidates. The
# delay starts when that exact node instance first appears and matches. An active
# fallback is not live-replaced if a preferred source appears later.
#
# [[device-groups]]
# name = "primary-keyboard"
#
# # Fail closed: only consume the post-processor keyboard, preserving remaps.
# [[device-groups.candidates]]
# name = "Example Keyboard"
# vendor = 0x1234
# product = 0xabcd
# version = 0x0000
# origin = "virtual"
# bustype = 0x0003 # BUS_USB preserved by the processor's uinput clone
#
# [[device-groups]]
# name = "primary-mouse"
#
# [[device-groups.candidates]]
# name = "Example Mouse"
# vendor = 0x1234
# product = 0xbcde
# version = 0x0000
# origin = "virtual"
# bustype = 0x0003
#
# # Use the exact physical mouse only if no preferred clone becomes available.
# [[device-groups.candidates]]
# path = "/dev/input/by-id/usb-Example_Mouse-event-mouse"
# origin = "physical"
# grab-delay-ms = 1000
#
# Run `rkvm-server /etc/rkvm/server.toml --list-devices` to inspect canonical
# paths, aliases, sysfs origin, source bus IDs, capabilities, and policy matches.

certificate = "/etc/rkvm/certificate.pem"
key = "/etc/rkvm/key.pem"

# This is to prevent malicious clients from connecting to the server.
# Make sure this matches your client's config.
#
# Change this to your own value before deploying rkvm.
password = "123456789"
